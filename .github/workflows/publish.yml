name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Docker test image
        run: docker pull python:3.13-slim

      - name: Install package and build tools
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python tests/testing.py

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
